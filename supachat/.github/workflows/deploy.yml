name: Supchat Secure CI/CD

on:
push:
branches: [ "main" ]

jobs:
security-and-build:
runs-on: ubuntu-latest

```
steps:
- name: Checkout code
  uses: actions/checkout@v3

# 🔍 Gitleaks (Secrets scanning)
- name: Run Gitleaks
  uses: gitleaks/gitleaks-action@v2
  with:
    args: detect --source . --verbose

# 🐳 Hadolint (Dockerfile lint)
- name: Run Hadolint (API)
  uses: hadolint/hadolint-action@v3.1.0
  with:
    dockerfile: infra/docker/Dockerfile.api

- name: Run Hadolint (WEB)
  uses: hadolint/hadolint-action@v3.1.0
  with:
    dockerfile: infra/docker/Dockerfile.web

# 🐳 Login to DockerHub
- name: Login to DockerHub
  run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

# 🏗 Build API Image
- name: Build API Image
  run: |
    docker build -t ${{ secrets.DOCKER_USERNAME }}/supchat-api:latest -f infra/docker/Dockerfile.api .

# 🏗 Build Web Image
- name: Build Web Image
  run: |
    docker build -t ${{ secrets.DOCKER_USERNAME }}/supchat-web:latest -f infra/docker/Dockerfile.web .

# 🔒 Trivy Scan (Image vulnerability scan)
- name: Scan API Image with Trivy
  uses: aquasecurity/trivy-action@master
  with:
    image-ref: ${{ secrets.DOCKER_USERNAME }}/supchat-api:latest
    format: table
    exit-code: 1
    severity: CRITICAL,HIGH

- name: Scan Web Image with Trivy
  uses: aquasecurity/trivy-action@master
  with:
    image-ref: ${{ secrets.DOCKER_USERNAME }}/supchat-web:latest
    format: table
    exit-code: 1
    severity: CRITICAL,HIGH

# 📤 Push Images
- name: Push Images
  run: |
    docker push ${{ secrets.DOCKER_USERNAME }}/supchat-api:latest
    docker push ${{ secrets.DOCKER_USERNAME }}/supchat-web:latest
```

deploy:
needs: security-and-build
runs-on: ubuntu-latest

```
steps:
- name: Deploy to EC2 via SSH
  uses: appleboy/ssh-action@v0.1.6
  with:
    host: ${{ secrets.EC2_HOST }}
    username: ubuntu
    key: ${{ secrets.EC2_SSH_KEY }}
    script: |
      cd /opt/Supchat/supachat
      docker compose pull
      docker compose up -d --remove-orphans
```

